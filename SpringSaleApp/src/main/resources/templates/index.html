<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>eCommerce's Admin</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="@{/}">Trang chu</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mynavbar">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item" th:each="c:${categories}">
                            <a class="nav-link" th:href="@{/(cateId=${c.id})}" th:text="${c.name}">Link</a>
                        </li>
                    </ul>
                    <form class="d-flex">
                        <input class="form-control me-2" type="text" placeholder="Search">
                        <button class="btn btn-primary" type="button">Search</button>
                    </form>
                </div>
            </div>
        </nav>
        <div class="container mt-4">
            <div class="row">
                <div class="col-md-3 mb-4" th:each="p : ${products}">
                    <div class="card">
                        <img class="card-img-top" th:src="${p.image}" alt="Product image">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${p.name}">Tên sản phẩm</h5>
                            <p class="card-text text-danger" th:text="${p.price} + ' VNĐ'">Giá</p>
                            <a href="#" class="btn btn-primary">Xem chi tiết</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <h2>
            <a th:href="@{/products}">Them san pham</a>
        </h2>>
    </body>
</html>
