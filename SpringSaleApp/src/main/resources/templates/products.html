<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Quan ly san pham</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="container mt-5">
        <h1>Quan ly san pham</h1>

        <form th:action="@{/admin/products}" method="post" th:object="${product}">

            <div class="mb-3">
                <label>Ten san pham:</label>
                <input class="form-control" th:field="*{name}"/>
            </div>

            <div class="mb-3">
                <label>Gia san pham:</label>
                <input class="form-control" type="number" th:field="*{price}"/>
            </div>

            <div class="mb-3">
                <label>Danh muc:</label>
                <select class="form-select" th:field="*{categoryId}">
                    <option th:each="c : ${categories}" 
                            th:value="${c.id}" 
                            th:text="${c.name}"></option>
                </select>
            </div>

            <input type="submit" class="btn btn-primary" value="Tao san pham">
        </form>
    </body>
</html>
